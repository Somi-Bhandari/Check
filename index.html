<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somika's Success Map | Personal Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>

:root{
--primary:#818cf8;
--bg:#0f172a;
--glass:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.15);
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top left,#1e1b4b,#0f172a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#f8fafc;
overflow:hidden;
}

#securityOverlay{
position:fixed;
inset:0;
background:#0f172a;
z-index:1000;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.auth-card{
background:var(--glass);
backdrop-filter:blur(25px);
border:1px solid var(--border);
padding:30px;
border-radius:20px;
width:100%;
max-width:400px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.auth-card h2{
color:var(--primary);
font-family:'Quicksand';
margin-bottom:20px;
}

.auth-card input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid var(--border);
background:rgba(255,255,255,0.05);
color:white;
box-sizing:border-box;
outline:none;
}

.auth-card button{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

.container{
width:100%;
max-width:600px;
height:90vh;
background:var(--glass);
backdrop-filter:blur(25px);
border:1px solid var(--border);
border-radius:20px;
display:none;
flex-direction:column;
overflow:hidden;
box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
margin-bottom:20px;
}

.header{
padding:20px;
text-align:center;
background:rgba(255,255,255,0.03);
border-bottom:1px solid var(--border);
}

.header h1{
font-family:'Quicksand';
margin:0;
font-size:1.4rem;
color:var(--primary);
letter-spacing:2px;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.msg{
max-width:90%;
padding:14px 18px;
border-radius:15px;
font-size:1rem;
line-height:1.5;
word-wrap:break-word;
}

.user-bubble{
background:var(--primary);
color:white;
align-self:flex-end;
border-bottom-right-radius:2px;
}

.ai-bubble{
background:rgba(255,255,255,0.95);
color:#1e293b;
align-self:flex-start;
border-bottom-left-radius:2px;
white-space:pre-wrap;
}

.action-buttons{
margin-top:10px;
display:flex;
gap:10px;
}

.action-buttons button{
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
background:#e5e7eb;
}

.input-area{
padding:20px;
padding-bottom:30px;
display:flex;
gap:10px;
background:rgba(0,0,0,0.3);
}

#userInput{
flex:1;
background:rgba(255,255,255,0.07);
border:1px solid var(--border);
border-radius:10px;
padding:12px 15px;
color:white;
outline:none;
}

#sendBtn{
background:var(--primary);
color:white;
border:none;
padding:0 20px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>
<div class="container" id="mainContainer">

<div class="header">
<h1>SOMIKA'S SUCCESS MAP</h1>
<p>I AM ALWAYS HERE FOR YOU SOMI</p>
</div>

<div class="chat-box" id="chatContainer">
<div class="msg ai-bubble">How May I help you Somika, I Am Ready Guide You.</div>
</div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
<button id="sendBtn" onclick="send()">SEND</button>
</div>

</div>

<script src="https://js.puter.com/v2/"></script>

<script>

(function(){emailjs.init("xwz3UbQ9UqSPUP3GB");})();

function speakText(text){
const speech=new SpeechSynthesisUtterance(text);
speech.lang="en-US";
speechSynthesis.speak(speech);
}

function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied!");
}

function getDailyMotivation(){

const lines=[
"Somika, every struggle today is shaping the compassionate nurse you will become tomorrow.",
"Your mother’s sacrifices are the roots of your future success. Keep moving forward.",
"Even difficult days are steps toward the proud moment when you become a nurse.",
"Your dream is powerful. Every day of study is bringing you closer to it.",
"Somika, discipline today will create the successful nurse of tomorrow."
];

return lines[Math.floor(Math.random()*lines.length)];

}

function getYoutubeVideo(text){

text=text.toLowerCase();

if(text.includes("study")||text.includes("exam"))
return "https://www.youtube.com/embed/IlU-zDU6aQ0";

if(text.includes("sad")||text.includes("stress"))
return "https://www.youtube.com/embed/Zi9To3zE9U8";

if(text.includes("nursing"))
return "https://www.youtube.com/embed/FnC2o0qU2hA";

return "https://www.youtube.com/embed/mgmVOuLgFB0";

}

const SOMIKA_BRAIN=`You are Somika AI mentor. Guide Somika to become a successful nurse.`;

async function send(){

const input=document.getElementById('userInput');
const box=document.getElementById('chatContainer');

if(!input.value.trim())return;

const val=input.value;

box.innerHTML+=`<div class="msg user-bubble">${val}</div>`;

input.value='';

const typingId="typing-"+Date.now();

box.innerHTML+=`<div class="msg ai-bubble" id="${typingId}">Typing to Somi...</div>`;

try{

const resp=await puter.ai.chat([
{role:"system",content:SOMIKA_BRAIN},
{role:"user",content:val}
]);

const aiText=resp.message.content;

document.getElementById(typingId).remove();

const video=getYoutubeVideo(val);
const motivation=getDailyMotivation();

box.innerHTML+=`

<div class="msg ai-bubble">

<div id="aiText">${aiText}</div>

<br>

<b>🌱 Daily Motivation</b><br>
${motivation}

<br><br>

<iframe width="100%" height="200" src="${video}" frameborder="0" allowfullscreen></iframe>

<div class="action-buttons">
<button onclick="speakText(\`${aiText}\`)">🔊 Speak</button>
<button onclick="copyText(\`${aiText}\`)">📋 Copy</button>
</div>

</div>

`;

box.scrollTop=box.scrollHeight;

}catch(e){

document.getElementById(typingId).innerText="Connection lost. Please try again.";

}

}

</script>

</body>
</html>
