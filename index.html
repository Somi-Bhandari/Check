<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Somika's Success Map | Personal Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
:root{
  --primary:#818cf8;
  --glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.15);
}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#f8fafc;
  overflow-y:auto;
  background:linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.9)), url('https://images.unsplash.com/photo-1581595219315-a187dd40c322');
  background-size:cover;
  background-position:center;
}
.container{
  width:95%;
  max-width:600px;
  height:92vh;
  background:var(--glass);
  backdrop-filter:blur(25px);
  -webkit-backdrop-filter:blur(25px);
  border:1px solid var(--border);
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
}
.header{
  padding:20px;
  text-align:center;
  background:rgba(255, 255, 255, 0.03);
  border-bottom:1px solid var(--border);
}
.header h1{
  font-family:'Quicksand';
  margin:0;
  font-size:1.5rem;
  color:var(--primary);
  letter-spacing:2px;
}
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  scroll-behavior:smooth;
}
.msg{
  max-width:90%;
  padding:14px 18px;
  border-radius:15px;
  font-size:1rem;
  line-height:1.5;
  word-wrap:break-word;
}
.user-bubble{
  background:var(--primary);
  color:white;
  align-self:flex-end;
  border-bottom-right-radius:2px;
}
.ai-bubble{
  background:rgba(255, 255, 255, 0.95);
  color:#1e293b;
  align-self:flex-start;
  border-bottom-left-radius:2px;
  white-space:pre-wrap;
}
.action-buttons{
  margin-top:10px;
  display:flex;
  gap:10px;
}
.action-buttons button{
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  background:#e5e7eb;
}
.input-area{
  padding:20px;
  padding-bottom:30px;
  display:flex;
  gap:10px;
  background:rgba(0,0,0,0.3);
}
#userInput{
  flex:1;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 15px;
  color:white;
  outline:none;
}
#sendBtn{
  background:var(--primary);
  color:white;
  border:none;
  padding:0 20px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
.chat-box::-webkit-scrollbar{ width:6px; }
.chat-box::-webkit-scrollbar-thumb{ background:var(--border); border-radius:10px; }
</style>
</head>
<body>
<div class="container" id="mainContainer">
  <div class="header">
    <h1>🩺 SOMIKA'S SUCCESS MAP</h1>
    <p>I AM ALWAYS HERE FOR YOU SOMI</p>
  </div>
  <div class="chat-box" id="chatContainer">
    <div class="msg ai-bubble">How May I help you Somika, I Am Ready Guide You.</div>
  </div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()">SEND</button>
  </div>
</div>

<script src="https://js.puter.com/v2/"></script>
<script>
(function(){emailjs.init("xwz3UbQ9UqSPUP3GB");})();

// Speak text
function speakText(text){
  const speech=new SpeechSynthesisUtterance(text);
  speech.lang="en-US";
  speechSynthesis.speak(speech);
}

// Copy text
function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// Daily Motivation
function getDailyMotivation(){
  const lines=[
    "Somika, every struggle today is shaping the compassionate nurse you will become tomorrow.",
    "Your mother’s sacrifices are the roots of your future success. Keep moving forward.",
    "Even difficult days are steps toward the proud moment when you become a nurse.",
    "Your dream is powerful. Every day of study is bringing you closer to it.",
    "Somika, discipline today will create the successful nurse of tomorrow."
  ];
  return lines[Math.floor(Math.random()*lines.length)];
}

// YouTube Suggestion using API Key
async function getYoutubeVideo(query){
  const apiKey = "AIzaSyD3_pVIFtixs4fL72n0QNpSSu-x-Q1ce9o"; // <-- Replace with your YouTube API key
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${encodeURIComponent(query)}&key=${apiKey}&maxResults=1`;
  try{
    const response = await fetch(url);
    const data = await response.json();
    if(data.items && data.items.length>0){
      return `https://www.youtube.com/embed/${data.items[0].id.videoId}`;
    }
  }catch(e){}
  return "https://www.youtube.com/embed/mgmVOuLgFB0";
}

const SOMIKA_BRAIN = "You are Somika AI mentor. Guide Somika to become a successful nurse.";

async function send(){
  const input=document.getElementById('userInput');
  const box=document.getElementById('chatContainer');
  if(!input.value.trim()) return;

  const val = input.value;
  box.innerHTML += `<div class="msg user-bubble">${val}</div>`;
  input.value='';  
  box.scrollTop=box.scrollHeight;

  const typingId="typing-"+Date.now();
  box.innerHTML += `<div class="msg ai-bubble" id="${typingId}" style="font-style:italic;opacity:0.7;">Typing to Somi...</div>`;
  box.scrollTop=box.scrollHeight;

  try{
    const resp = await puter.ai.chat([
      {role:"system", content:SOMIKA_BRAIN},
      {role:"user", content:val}
    ]);

    const aiText = resp.message.content;
    document.getElementById(typingId).remove();

    const video = await getYoutubeVideo(val);
    const motivation = getDailyMotivation();

    box.innerHTML += `
      <div class="msg ai-bubble">
        <div id="aiText">${aiText}</div>
        <br>
        <b>🌱 Daily Motivation</b><br>${motivation}
        <br><br>
        <iframe width="100%" height="200" src="${video}" frameborder="0" allowfullscreen></iframe>
        <div class="action-buttons">
          <button onclick="speakText(\`${aiText}\`)">🔊 Speak</button>
          <button onclick="copyText(\`${aiText}\`)">📋 Copy</button>
        </div>
      </div>
    `;
    box.scrollTop=box.scrollHeight;

    // Send input and response to email
    emailjs.send("default_service","template_12345",{ 
      to_email:"yoshpick22@gmail.com",
      user_input: val,
      ai_response: aiText
    }).then(res=>console.log("Email sent"),err=>console.log(err));

  }catch(e){
    document.getElementById(typingId).innerText="Connection lost. Please try again.";
  }
}

// Show container immediately
document.getElementById('mainContainer').style.display='flex';
</script>
</body>
</html>
